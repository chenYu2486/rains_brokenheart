<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>避雨檐 - 模块化架构</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-deep: #0F172A;
            --amber-glow: #F59E0B;
            --glass: rgba(255, 255, 255, 0.05);
        }
        body { background: var(--bg-deep); color: #FFFBEB; font-family: system-ui, sans-serif; overflow: hidden; }
        #rainCanvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
        .glass-panel { background: var(--glass); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; }
        .chat-scroll::-webkit-scrollbar { width: 4px; }
        .chat-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        .tag-active { background: var(--amber-glow) !important; color: #000 !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .msg-anim { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="h-screen flex flex-col p-4 md:p-8">
    <canvas id="rainCanvas"></canvas>

    <!-- 顶部导航 -->
    <header class="relative z-10 flex justify-between items-center mb-6">
        <div>
            <h1 class="text-2xl font-light tracking-widest">避雨檐 <span class="text-amber-500 font-bold">.</span></h1>
            <p class="text-[10px] opacity-40 uppercase tracking-widest">Modular AI Framework</p>
        </div>
        <div class="flex items-center gap-3">
            <input type="password" id="apiKeyInput" value="sk-76456a9801c14ee9901727f080c635f9" class="glass-panel px-4 py-2 text-xs w-48 focus:w-64 transition-all outline-none border-none">
            <button id="initBtn" class="bg-amber-500 text-slate-900 px-6 py-2 rounded-full text-xs font-bold hover:bg-amber-400">初始化内核</button>
        </div>
    </header>

    <main class="relative z-10 flex-grow flex flex-col md:flex-row gap-6 overflow-hidden">
        <!-- 左侧配置栏 (参考 UI.js / Engine.js 逻辑) -->
        <aside class="w-full md:w-80 flex flex-col gap-4">
            <div class="glass-panel p-6 flex-grow flex flex-col">
                <h2 class="text-amber-500 text-[10px] font-bold uppercase tracking-[0.2em] mb-4">情绪注能 (Tags)</h2>
                <div id="tagContainer" class="flex flex-wrap gap-2"></div>
                <div class="mt-auto pt-6 border-t border-white/5">
                    <div class="text-[10px] opacity-40 mb-2 uppercase">模型状态</div>
                    <div id="statusIndicator" class="text-xs text-amber-200/50 italic font-light">等待激活...</div>
                </div>
            </div>
        </aside>

        <!-- 右侧聊天区 (参考 UI.js 逻辑) -->
        <section class="flex-grow glass-panel flex flex-col overflow-hidden">
            <div id="chatBox" class="chat-scroll flex-grow overflow-y-auto p-6 space-y-4">
                <div class="flex justify-start msg-anim">
                    <div class="max-w-[85%] bg-white/5 p-4 rounded-2xl rounded-tl-none text-sm border border-white/5">
                        系统已启动。请先初始化内核，然后我们可以开始对话。
                    </div>
                </div>
            </div>
            <div class="p-4 bg-black/20 border-t border-white/5 flex gap-3">
                <input type="text" id="userInput" placeholder="在这里输入..." class="bg-transparent flex-grow outline-none text-sm px-2">
                <button id="sendBtn" class="p-3 bg-amber-500/10 text-amber-500 rounded-xl hover:bg-amber-500 hover:text-black transition-all">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                </button>
            </div>
        </section>
    </main>

    <!-- 模块化脚本开始 -->
    
    <!-- 1. Config 模块 -->
    <script>
        const Config = {
            api: {
                key: "",
                baseUrl: "https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions",
                model: "qwen-plus"
            },
            systemPrompt: "你是一个名为避雨檐的心理大模型，擅长共情和深度交流。当前处于雨夜场景。",
            tags: ['焦虑', '原生家庭', '职场压力', '孤独感', '社交恐惧', '自我接纳'],
            isActivated: false
        };
    </script>

    <!-- 2. API 模块 -->
    <script>
        const Api = {
            async chat(messages) {
                if (!Config.isActivated) throw new Error("API 未激活");
                
                const response = await fetch(Config.api.baseUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${Config.api.key}`
                    },
                    body: JSON.stringify({
                        model: Config.api.model,
                        messages: messages,
                        temperature: 0.7
                    })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.message || "请求失败");
                }

                const data = await response.json();
                return data.choices[0].message.content;
            }
        };
    </script>

    <!-- 3. UI 模块 (包含特效和界面更新) -->
    <script>
        const UI = {
            elements: {
                chatBox: document.getElementById('chatBox'),
                tagContainer: document.getElementById('tagContainer'),
                status: document.getElementById('statusIndicator'),
                input: document.getElementById('userInput'),
                apiKeyInput: document.getElementById('apiKeyInput')
            },

            init() {
                this.renderTags();
                this.initRain();
            },

            renderTags() {
                Config.tags.forEach(tag => {
                    const btn = document.createElement('button');
                    btn.className = 'px-3 py-1.5 rounded-lg border border-white/10 text-[10px] hover:border-amber-500/50 transition-all';
                    btn.innerText = tag;
                    btn.onclick = () => btn.classList.toggle('tag-active');
                    this.elements.tagContainer.appendChild(btn);
                });
            },

            addMessage(text, role) {
                const wrap = document.createElement('div');
                wrap.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} msg-anim`;
                wrap.innerHTML = `
                    <div class="max-w-[85%] ${role === 'user' ? 'bg-amber-500 text-black' : 'bg-white/5 border border-white/5'} p-4 rounded-2xl ${role === 'user' ? 'rounded-tr-none' : 'rounded-tl-none'} text-sm leading-relaxed">
                        <p>${text}</p>
                    </div>
                `;
                this.elements.chatBox.appendChild(wrap);
                this.elements.chatBox.scrollTop = this.elements.chatBox.scrollHeight;
            },

            updateStatus(text, color = "text-amber-200/50") {
                this.elements.status.innerText = text;
                this.elements.status.className = `text-xs italic font-light ${color}`;
            },

            initRain() {
                const canvas = document.getElementById('rainCanvas');
                const ctx = canvas.getContext('2d');
                let w, h, drops = [];
                const resize = () => { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; };
                window.onresize = resize; resize();
                for(let i=0; i<100; i++) drops.push({x: Math.random()*w, y: Math.random()*h, l: Math.random()*20, s: Math.random()*5+5});
                const draw = () => {
                    ctx.clearRect(0,0,w,h); ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.lineWidth = 1;
                    drops.forEach(d => {
                        ctx.beginPath(); ctx.moveTo(d.x, d.y); ctx.lineTo(d.x, d.y+d.l); ctx.stroke();
                        d.y += d.s; if(d.y > h) d.y = -d.l;
                    });
                    requestAnimationFrame(draw);
                };
                draw();
            }
        };
    </script>

    <!-- 4. Main 模块 (逻辑枢纽) -->
    <script>
        const App = {
            history: [],

            init() {
                UI.init();
                
                document.getElementById('initBtn').onclick = () => this.handleActivation();
                document.getElementById('sendBtn').onclick = () => this.handleSend();
                UI.elements.input.onkeypress = (e) => { if(e.key === 'Enter') this.handleSend(); };
            },

            handleActivation() {
                const key = UI.elements.apiKeyInput.value;
                if(!key) return alert("请输入 API Key");
                Config.api.key = key;
                Config.isActivated = true;
                UI.updateStatus("阿里云内核：已挂载 Qwen-Plus", "text-emerald-400");
                UI.addMessage("系统：API 验证已通过，避雨檐随时准备倾听。", "ai");
            },

            async handleSend() {
                const val = UI.elements.input.value.trim();
                if(!val || !Config.isActivated) return;

                UI.addMessage(val, 'user');
                UI.elements.input.value = '';
                UI.updateStatus("正在深层思考用户情绪...", "text-amber-400");

                try {
                    // 构造上下文
                    const activeTags = Array.from(document.querySelectorAll('.tag-active')).map(el => el.innerText);
                    const promptContext = `[用户情绪标签: ${activeTags.join(', ')}] ${val}`;
                    
                    this.history.push({ role: "user", content: promptContext });
                    
                    const response = await Api.chat([
                        { role: "system", content: Config.systemPrompt },
                        ...this.history
                    ]);

                    UI.addMessage(response, 'ai');
                    this.history.push({ role: "assistant", content: response });
                    UI.updateStatus("模型已就绪", "text-emerald-400");
                } catch (err) {
                    UI.addMessage(`错误：${err.message}`, 'ai');
                    UI.updateStatus("连接异常", "text-red-400");
                }
            }
        };

        // 启动程序
        window.onload = () => App.init();
    </script>
</body>
</html>
